<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG 3D Logo Tool – Outline Scale</title>
<style>
body{margin:0;background:#111;color:white;font-family:Arial;overflow:hidden;}
#ui{
  position:absolute; top:20px; left:20px;
  background:#222; padding:15px; border-radius:10px;
  width:360px; z-index:10;
  max-height:90vh; overflow-y:auto;
}
input[type=range], select, input[type=text]{width:100%; margin-top:5px;}
button{margin-top:5px;width:100%;padding:6px;background:#3a7cff;border:none;color:white;border-radius:5px;cursor:pointer;}
#log{margin-top:10px;font-size:12px;background:#000;padding:8px;height:120px;overflow:auto;border-radius:6px;}
</style>
</head>
<body>

<div id="ui">
  <input type="file" id="upload" accept="image/svg+xml,.svg">
  <br><br>
  Thickness
  <input type="range" id="depth" min="2" max="100" value="20">
  <br>
  Pitch
  <input type="range" id="pitch" min="-180" max="180" value="0">
  <br>
  Yaw
  <input type="range" id="yaw" min="-180" max="180" value="0">
  <br>
  Outline Depth
  <input type="range" id="outlineDepth" min="1" max="50" value="5">
  <br>
  Outline Scale %
  <input type="range" id="outlineScale" min="101" max="120" value="105">
  <br>
  Override Path:
  <select id="pathSelect"><option value="">--Choose Path--</option></select>
  <select id="overrideColor">
    <option value="#FFD700">Gold</option>
    <option value="#C0C0C0">Silver</option>
    <option value="#00FFFF">Cyan</option>
  </select>
  <button id="applyOverride">Apply Override</button>
  <button id="toggleWireframe">Toggle Wireframe</button>
  <br>
  <input type="text" id="presetName" placeholder="Preset Name">
  <button id="savePreset">Save Preset</button>
  <select id="loadPreset"><option value="">--Load Preset--</option></select>
  <br>
  <button id="export">Export PNG</button>
  <div id="log"></div>
</div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.152.2?bundle";
import { SVGLoader } from "https://esm.sh/three@0.152.2/examples/jsm/loaders/SVGLoader.js?bundle";
import { OrbitControls } from "https://esm.sh/three@0.152.2/examples/jsm/controls/OrbitControls.js?bundle";

/* Logging */
function log(msg){
  const el = document.getElementById("log");
  const time = new Date().toLocaleTimeString();
  el.innerHTML += `[${time}] ${msg}<br>`;
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}
log("App started");

/* Three.js setup */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0,0,400);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true, preserveDrawingBuffer:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* Lights */
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const dirLight = new THREE.DirectionalLight(0xffffff,1);
dirLight.position.set(200,200,300);
scene.add(dirLight);

/* Controls */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enableZoom = true;

/* Variables */
let meshGroup = null;
let outlineGroup = null;
let pathsData = null;
let wireframe = false;
const pathOverrides = new Map();
let presets = {};

/* Load presets from localStorage */
function loadPresetsFromStorage(){
  const data = localStorage.getItem("svg3dPresets");
  if(data) presets = JSON.parse(data);
  const loadSelect = document.getElementById("loadPreset");
  loadSelect.innerHTML = '<option value="">--Load Preset--</option>';
  Object.keys(presets).forEach(name=>{
    loadSelect.innerHTML += `<option value="${name}">${name}</option>`;
  });
}
loadPresetsFromStorage();

/* Build mesh */
function buildMesh(){
  if(!pathsData) return;
  if(meshGroup) scene.remove(meshGroup);
  if(outlineGroup) scene.remove(outlineGroup);

  const depth = parseFloat(document.getElementById("depth").value);
  const outlineDepth = parseFloat(document.getElementById("outlineDepth").value);
  const outlineScale = parseFloat(document.getElementById("outlineScale").value)/100;

  meshGroup = new THREE.Group();
  outlineGroup = new THREE.Group();

  // Main logo meshes
  pathsData.forEach((path,i)=>{
    const shapes = path.toShapes(true);
    const color = pathOverrides.has(i) ? pathOverrides.get(i) : (path.userData.style.fill || "#ffffff");
    shapes.forEach(shape=>{
      const geometry = new THREE.ExtrudeGeometry(shape,{depth:depth, bevelEnabled:false});
      const material = new THREE.MeshStandardMaterial({
        color: new THREE.Color(color),
        metalness:0.8,
        roughness:0.2,
        wireframe: wireframe
      });
      meshGroup.add(new THREE.Mesh(geometry,material));
    });
  });

  // Outline: duplicate logo meshes, scale slightly, silver metallic
  pathsData.forEach(path=>{
    const shapes = path.toShapes(true);
    shapes.forEach(shape=>{
      // clone shape
      const outlineShape = shape.clone();
      outlineShape.scale(outlineScale, outlineScale);
      const geometry = new THREE.ExtrudeGeometry(outlineShape,{depth:outlineDepth, bevelEnabled:false});
      const material = new THREE.MeshStandardMaterial({
        color: new THREE.Color("#C0C0C0"),
        metalness:1,
        roughness:0.2,
        wireframe: wireframe
      });
      const mesh = new THREE.Mesh(geometry,material);
      mesh.position.z = -outlineDepth; // behind logo
      outlineGroup.add(mesh);
    });
  });

  // Flip vertically
  meshGroup.scale.y = -1;
  outlineGroup.scale.y = -1;

  // Center & scale
  const box = new THREE.Box3().setFromObject(meshGroup);
  const size = box.getSize(new THREE.Vector3()).length();
  const scale = 300 / size;
  meshGroup.scale.multiplyScalar(scale);
  outlineGroup.scale.multiplyScalar(scale);
  const center = box.getCenter(new THREE.Vector3());
  meshGroup.position.sub(center.multiplyScalar(scale));
  outlineGroup.position.sub(center.multiplyScalar(scale));

  // Apply pitch/yaw
  const pitch = parseFloat(document.getElementById("pitch").value) * Math.PI/180;
  const yaw = parseFloat(document.getElementById("yaw").value) * Math.PI/180;
  meshGroup.rotation.x = pitch;
  meshGroup.rotation.y = yaw;
  outlineGroup.rotation.x = pitch;
  outlineGroup.rotation.y = yaw;

  scene.add(outlineGroup);
  scene.add(meshGroup);

  log(`3D SVG mesh built: ${pathsData.length} paths, depth ${depth}, outline ${outlineDepth}`);
}

/* Load SVG */
function loadSVG(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result;
    const loader = new SVGLoader();
    const data = loader.parse(text);
    if(!data.paths.length){
      log("No paths found in SVG!");
      return;
    }
    pathsData = data.paths;
    pathOverrides.clear();
    updatePathSelect();
    buildMesh();
  };
  reader.readAsText(file);
}

/* Update path dropdown */
function updatePathSelect(){
  const select = document.getElementById("pathSelect");
  select.innerHTML = '<option value="">--Choose Path--</option>';
  if(!pathsData) return;
  pathsData.forEach((p,i)=>{
    const name = p.userData.id || `Path ${i}`;
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = name;
    select.appendChild(opt);
  });
}

/* Event handlers */
document.getElementById("upload").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;
  log(`Uploaded: ${file.name} (${file.type})`);
  loadSVG(file);
});

document.getElementById("depth").addEventListener("input", buildMesh);
document.getElementById("outlineDepth").addEventListener("input", buildMesh);
document.getElementById("outlineScale").addEventListener("input", buildMesh);
document.getElementById("pitch").addEventListener("input", buildMesh);
document.getElementById("yaw").addEventListener("input", buildMesh);

document.getElementById("applyOverride").onclick = ()=>{
  const pathIndex = document.getElementById("pathSelect").value;
  const color = document.getElementById("overrideColor").value;
  if(pathIndex==="") return;
  pathOverrides.set(Number(pathIndex), color);
  buildMesh();
};

document.getElementById("toggleWireframe").onclick = ()=>{
  wireframe = !wireframe;
  if(meshGroup) meshGroup.children.forEach(c=>c.material.wireframe = wireframe);
  if(outlineGroup) outlineGroup.children.forEach(c=>c.material.wireframe = wireframe);
};

/* Presets */
document.getElementById("savePreset").onclick = ()=>{
  const name = document.getElementById("presetName").value.trim();
  if(!name){ log("Enter a preset name!"); return; }
  presets[name] = {
    depth: document.getElementById("depth").value,
    outlineDepth: document.getElementById("outlineDepth").value,
    outlineScale: document.getElementById("outlineScale").value,
    pitch: document.getElementById("pitch").value,
    yaw: document.getElementById("yaw").value
  };
  localStorage.setItem("svg3dPresets", JSON.stringify(presets));
  const loadSelect = document.getElementById("loadPreset");
  loadSelect.innerHTML += `<option value="${name}">${name}</option>`;
  log(`Preset saved: ${name}`);
};

document.getElementById("loadPreset").addEventListener("change", ()=>{
  const name = document.getElementById("loadPreset").value;
  if(!presets[name]) return;
  const preset = presets[name];
  document.getElementById("depth").value = preset.depth;
  document.getElementById("outlineDepth").value = preset.outlineDepth;
  document.getElementById("outlineScale").value = preset.outlineScale;
  document.getElementById("pitch").value = preset.pitch;
  document.getElementById("yaw").value = preset.yaw;
  buildMesh();
  log(`Preset loaded: ${name}`);
});

document.getElementById("export").onclick = ()=>{
  const link = document.createElement("a");
  link.download = "logo.png";
  link.href = renderer.domElement.toDataURL();
  link.click();
};

/* Render loop */
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

/* Resize */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
