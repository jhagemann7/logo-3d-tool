<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Logo 3D Tool - SVG Only</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

#ui{
  position:absolute;
  top:20px;
  left:20px;
  background:#222;
  padding:15px;
  border-radius:10px;
  width:260px;
  z-index:10;
}

#log{
  margin-top:10px;
  font-size:12px;
  background:#000;
  padding:8px;
  height:120px;
  overflow:auto;
  border-radius:6px;
}

input[type=range]{ width:100%; }

button{
  margin-top:10px;
  width:100%;
  padding:6px;
  background:#3a7cff;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
  margin-top:5px;
}
</style>
</head>

<body>

<div id="ui">
  <input type="file" id="upload" accept="image/svg+xml,.svg">
  <br><br>
  Thickness
  <input type="range" id="depth" min="2" max="100" value="20">
  <button id="toggleWireframe">Toggle Wireframe</button>
  <button id="export">Export PNG</button>
  <div id="log"></div>
</div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.152.2?bundle";
import { SVGLoader } from "https://esm.sh/three@0.152.2/examples/jsm/loaders/SVGLoader.js?bundle";
import { OrbitControls } from "https://esm.sh/three@0.152.2/examples/jsm/controls/OrbitControls.js?bundle";

/* -------- LOGGING -------- */
function log(msg){
  const el=document.getElementById("log");
  const time=new Date().toLocaleTimeString();
  el.innerHTML+="["+time+"] "+msg+"<br>";
  el.scrollTop=el.scrollHeight;
  console.log(msg);
}
log("App started");

/* -------- THREE.JS SETUP -------- */
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0,0,400);

let renderer = new THREE.WebGLRenderer({antialias:true, alpha:true, preserveDrawingBuffer:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* -------- LIGHTING -------- */
let ambient = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(ambient);
let directional = new THREE.DirectionalLight(0xffffff,1);
directional.position.set(200,200,300);
scene.add(directional);

/* -------- CONTROLS -------- */
let controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enableZoom = true;

/* -------- VARIABLES -------- */
let mesh, shapes = [];
let wireframe=false;

/* -------- BUILD MESH -------- */
function buildMesh(){
  if(!shapes || shapes.length===0) return;
  if(mesh) scene.remove(mesh);

  const depth = parseFloat(document.getElementById("depth").value);

  const geometry = new THREE.ExtrudeGeometry(shapes, {depth:depth, bevelEnabled:false});
  geometry.center();

  const material = new THREE.MeshStandardMaterial({
    color:0xffffff,
    metalness:0.2,
    roughness:0.6,
    wireframe: wireframe
  });

  mesh = new THREE.Mesh(geometry, material);

  // Auto-scale mesh to fit view
  const box = new THREE.Box3().setFromObject(mesh);
  const size = box.getSize(new THREE.Vector3()).length();
  const scale = 300 / size; // adjust scaling
  mesh.scale.set(scale, scale, scale);

  const center = box.getCenter(new THREE.Vector3());
  mesh.position.sub(center.multiplyScalar(scale));

  scene.add(mesh);
  log("Mesh built: "+shapes.length+" shapes, depth "+depth);
}

/* -------- LOAD SVG -------- */
function loadSVG(file){
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result;
    const loader = new SVGLoader();
    const data = loader.parse(text);

    shapes = [];
    data.paths.forEach(path=>{
      shapes.push(...path.toShapes(true));
    });

    log("SVG loaded: "+shapes.length+" shapes detected");
    buildMesh();
  };
  reader.readAsText(file);
}

/* -------- FILE UPLOAD -------- */
document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;
  log("Uploaded: "+file.name);
  loadSVG(file);
});

/* -------- DEPTH SLIDER -------- */
document.getElementById("depth").oninput = buildMesh;

/* -------- WIRE FRAME TOGGLE -------- */
document.getElementById("toggleWireframe").onclick = ()=>{
  wireframe = !wireframe;
  if(mesh) mesh.material.wireframe = wireframe;
}

/* -------- EXPORT -------- */
document.getElementById("export").onclick = ()=>{
  const link = document.createElement("a");
  link.download = "logo.png";
  link.href = renderer.domElement.toDataURL();
  link.click();
}

/* -------- RENDER LOOP -------- */
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

/* -------- RESIZE -------- */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
